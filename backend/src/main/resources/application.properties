spring.application.name=wheel-hub-backend
server.port=${SERVER_PORT:18081}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002}
app.data-dir=${APP_DATA_HOME:./data}
app.auth.session-hours=${APP_AUTH_SESSION_HOURS:12}
app.ai-ml.base-url=${APP_AI_ML_BASE_URL:http://localhost:18100}
app.security.secret=${APP_SECURITY_SECRET:wheel-hub-platform-secret}
